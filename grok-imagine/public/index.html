<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grok Imagine ビューア</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1 id="page-title">投稿一覧</h1>
    <nav id="breadcrumb"></nav>
    <div class="search-box">
      <input id="global-search" type="search" placeholder="プロンプトで動画を検索(Enterで実行)" />
    </div>
  </header>
  <main id="app"></main>

  <div id="video-modal" class="modal hidden">
    <button id="modal-prev" class="modal-nav modal-nav-prev" aria-label="前の動画">‹</button>
    <div class="modal-content">
      <button id="modal-close" aria-label="閉じる">✕</button>
      <video id="modal-video" controls autoplay playsinline></video>
      <img id="modal-image" />
      <div id="modal-caption" class="modal-caption"></div>
    </div>
    <button id="modal-next" class="modal-nav modal-nav-next" aria-label="次の動画">›</button>
  </div>

  <script src="/app.js"></script>
</body>
</html>
